name: Archive X Media

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: x-art-archiver
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore archive.db cache
        uses: actions/cache@v4
        with:
          path: archive.db
          key: archiver-db-${{ hashFiles('archive.db') }}
          restore-keys: |
            archiver-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          ARTIST_ACCOUNTS: ${{ secrets.ARTIST_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          check() { if [ -z "$1" ]; then echo "::error::$2 Secret이 비어 있습니다."; exit 1; fi; }
          check "$X_AUTH_TOKEN" "X_AUTH_TOKEN"
          check "$X_CT0" "X_CT0"
          check "$ARTIST_ACCOUNTS" "ARTIST_ACCOUNTS"
          check "$TELEGRAM_BOT_TOKEN" "TELEGRAM_BOT_TOKEN"
          check "$TELEGRAM_CHAT_ID" "TELEGRAM_CHAT_ID"
          echo "Secrets 5개 모두 설정됨"

      - name: Run archiver
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          ARTIST_ACCOUNTS: ${{ secrets.ARTIST_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py --once -v

      - name: Save archive.db cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('archive.db') != ''
        with:
          path: archive.db
          key: archiver-db-${{ hashFiles('archive.db') }}
